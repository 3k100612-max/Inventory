<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Users</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light p-4">
    <div class="container">
        <div class="d-flex justify-content-between mb-4"><h3 class="fw-bold">User Management</h3><a href="/" class="btn btn-sm btn-outline-primary">Back</a></div>
        <div class="row">
            <div class="col-md-4"><div class="card p-3"><h6 class="fw-bold">Add User</h6>
                <form method="POST"><input name="username" class="form-control mb-2" placeholder="Username" required><input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
                    <div class="form-check mb-3"><input type="checkbox" name="is_admin" class="form-check-input" id="ac"><label class="form-check-label small" for="ac">Admin Privileges</label></div>
                    <button class="btn btn-primary btn-sm w-100">Create Account</button></form>
            </div></div>
            <div class="col-md-8"><table class="table bg-white rounded shadow-sm"><thead><tr><th>User</th><th>Role</th><th>Action</th></tr></thead><tbody>
                {% for u in users %}<tr><td>{{u.username}}</td><td>{{'Admin' if u.is_admin else 'Staff'}}</td><td>{% if u.id != current_user.id %}<a href="{{url_for('delete_user', user_id=u.id)}}" class="text-danger">Delete</a>{% endif %}</td></tr>{% endfor %}
            </tbody></table></div>
        </div>
    </div>
</body>
</html>
