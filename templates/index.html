<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f0f2f5; padding: 15px; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
        #reader-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; min-height: 250px; }
        #reader { width: 100%; }
        .flash-success { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(40, 167, 69, 0.4); z-index: 20; display: none; }
        .session-bar { display: none; background: #fff; border-left: 5px solid #0d6efd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .note-text { font-size: 0.85rem; color: #6c757d; font-style: italic; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h2 class="text-center mb-4">Inventory Control</h2>

    <!-- SESSION INFO & DONE BUTTON -->
    <div id="session_info" class="session-bar card shadow-sm p-3" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
                <span id="ui_mode" class="badge bg-dark me-1"></span>
                <span id="ui_device" class="badge bg-info text-dark me-1"></span>
                <span id="ui_status" class="badge bg-primary"></span>
            </div>
            <button class="btn btn-success fw-bold" onclick="finishSession()">DONE SCANNING</button>
        </div>
        <div id="ui_notes_display" class="note-text border-top pt-1"></div>
    </div>

    <!-- SCANNER SECTION -->
    <div id="scanner_wrapper" style="display:none;">
        <div class="card">
            <div id="reader-container">
                <div id="reader"></div>
                <div id="flash" class="flash-success"></div>
            </div>
            <div class="p-3">
                <input type="text" id="manual_code" class="form-control" placeholder="Or type code manually...">
            </div>
        </div>
    </div>

    <!-- START SCREEN -->
    <div id="start_screen" class="text-center py-5">
        <button class="btn btn-primary btn-lg px-5 shadow" onclick="showSetup()">+ Start New Scan Session</button>
    </div>

    <!-- HISTORY TABLE -->
    <div class="card p-3">
        <h5 class="mb-3">Recent Activity</h5>
        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Device</th>
                        <th>Status</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody id="history_body">
                    {% for scan in scans %}
                    <tr {% if scan.is_flagged %}class="table-danger"{% endif %}>
                        <td class="fw-bold">{{ scan.code }}{% if scan.is_flagged %} 🚩{% endif %}</td>
                        <td>{{ scan.device_type }}</td>
                        <td><span class="badge bg-secondary">{{ scan.status }}</span></td>
                        <td class="note-text">{{ scan.notes or '' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- SETUP MODAL -->
<div class="modal fade" id="setupModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title">Session Configuration</h5>
            </div>
            <div class="modal-body">
                <!-- 1. MODE -->
                <label class="fw-bold mb-1 small text-muted">1. SCAN MODE</label>
                <div class="btn-group w-100 mb-3">
                    <input type="radio" class="btn-check" name="mode" id="m1" value="single" checked>
                    <label class="btn btn-outline-primary" for="m1">Single Scan</label>
                    <input type="radio" class="btn-check" name="mode" id="m2" value="multiple">
                    <label class="btn btn-outline-primary" for="m2">Multiple Scan</label>
                </div>

                <!-- 2. DEVICE TYPE -->
                <label class="fw-bold mb-1 small text-muted">2. DEVICE TYPE</label>
                <select id="device_type" class="form-select mb-2" onchange="togglePeripheralInput()">
                    <option value="Laptop">Laptop</option>
                    <option value="Mobile">Mobile</option>
                    <option value="Monitor">Monitor</option>
                    <option value="Docking Station">Docking Station</option>
                    <option value="Peripherals">Peripherals</option>
                </select>
                <input type="text" id="peri_detail" class="form-control mb-3" placeholder="Enter peripheral name (e.g. Mouse)" style="display:none;">

                <!-- 3. STATUS -->
                <label class="fw-bold mb-1 small text-muted">3. STATUS</label>
                <div class="row g-2 mb-3">
                    <div class="col-4"><input type="radio" class="btn-check" name="status" id="s1" value="In Stock" checked><label class="btn btn-sm btn-outline-secondary w-100" for="s1">In Stock</label></div>
                    <div class="col-4"><input type="radio" class="btn-check" name="status" id="s2" value="In Use"><label class="btn btn-sm btn-outline-secondary w-100" for="s2">In Use</label></div>
                    <div class="col-4"><input type="radio" class="btn-check" name="status" id="s3" value="Returned"><label class="btn btn-sm btn-outline-secondary w-100" for="s3">Returned</label></div>
                    <div class="col-4"><input type="radio" class="btn-check" name="status" id="s4" value="Released"><label class="btn btn-sm btn-outline-secondary w-100" for="s4">Released</label></div>
                    <div class="col-4"><input type="radio" class="btn-check" name="status" id="s5" value="Repair"><label class="btn btn-sm btn-outline-warning w-100" for="s5">Repair</label></div>
                    <div class="col-4"><input type="radio" class="btn-check" name="status" id="s6" value="Retired"><label class="btn btn-sm btn-outline-danger w-100" for="s6">Retired</label></div>
                </div>

                <!-- 4. NOTES -->
                <label class="fw-bold mb-1 small text-muted">4. NOTES (OPTIONAL)</label>
                <textarea id="m_notes" class="form-control" rows="2" placeholder="Add any extra details..."></textarea>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-primary w-100 py-2 shadow-sm" onclick="confirmSetup()">Confirm & Start Scanning</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let html5QrCode;
let session = { mode: 'single', device: '', peri: '', status: '', notes: '' };
const setupModal = new bootstrap.Modal(document.getElementById('setupModal'));

function showSetup() { setupModal.show(); }

function togglePeripheralInput() {
    const isPeri = document.getElementById('device_type').value === 'Peripherals';
    document.getElementById('peri_detail').style.display = isPeri ? 'block' : 'none';
}

function confirmSetup() {
    session.mode = document.querySelector('input[name="mode"]:checked').value;
    session.device = document.getElementById('device_type').value;
    session.peri = document.getElementById('peri_detail').value;
    session.status = document.querySelector('input[name="status"]:checked').value;
    session.notes = document.getElementById('m_notes').value;

    setupModal.hide();
    startScanningUI();
}

function startScanningUI() {
    document.getElementById('start_screen').style.display = 'none';
    document.getElementById('session_info').style.display = 'block';
    document.getElementById('scanner_wrapper').style.display = 'block';
    
    document.getElementById('ui_mode').innerText = session.mode.toUpperCase();
    document.getElementById('ui_device').innerText = session.device + (session.peri ? `: ${session.peri}` : '');
    document.getElementById('ui_status').innerText = session.status;
    document.getElementById('ui_notes_display').innerText = session.notes ? "Notes: " + session.notes : "";

    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess);
}

function onScanSuccess(decodedText) {
    const flash = document.getElementById('flash');
    flash.style.display = 'block';
    setTimeout(() => flash.style.display = 'none', 200);
    if (navigator.vibrate) navigator.vibrate(100);

    saveData(decodedText);
}

function saveData(code) {
    fetch('/scanned', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            code: code,
            device_type: session.device,
            peripheral_detail: session.peri,
            status: session.status,
            notes: session.notes
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.is_flagged) alert(data.warning);
        
        // Update table immediately
        const row = `<tr><td class="fw-bold">${code}</td><td>${session.device}</td><td><span class="badge bg-secondary">${session.status}</span></td><td class="note-text">${session.notes}</td></tr>`;
        document.getElementById('history_body').insertAdjacentHTML('afterbegin', row);

        if (session.mode === 'single') {
            finishSession();
        }
    });
}

function finishSession() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload()).catch(() => location.reload());
    } else {
        location.reload();
    }
}

document.getElementById('manual_code').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { saveData(this.value); this.value = ''; }
});
</script>
</body>
</html>
