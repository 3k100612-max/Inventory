<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>High-Speed BI Scanner</title>
    <!-- Optimized Scanning Engine -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f1f5f9; }
        
        /* The Scanner Container */
        #reader { 
            width: 100%; 
            max-width: 500px; 
            margin: auto; 
            background: #000;
            overflow: hidden;
            border-bottom: 4px solid var(--primary);
        }

        /* UI Elements */
        .controls { padding: 20px; text-align: center; }
        .status-badge { 
            display: inline-block; padding: 6px 12px; border-radius: 20px;
            background: #dbeafe; color: var(--primary); font-weight: 600; font-size: 0.8em;
            margin-bottom: 10px;
        }

        /* Modal for Data Entry */
        .modal { 
            display: none; position: fixed; z-index: 100; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); 
        }
        .modal-content { 
            background: white; margin: 15% auto; padding: 25px; 
            width: 85%; max-width: 400px; border-radius: 15px; 
        }
        
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="controls">
        <div class="status-badge">HARDWARE ACCELERATION ACTIVE</div>
        <h2>Asset Inventory</h2>
        <p>Point camera at any barcode or QR code</p>
    </div>

    <!-- Data Entry Popup -->
    <div id="formModal" class="modal">
        <div class="modal-content">
            <h3 id="scannedIdLabel" style="color:var(--primary); font-family:monospace;"></h3>
            <label>Asset Status</label>
            <select id="status">
                <option value="Returned">Returned</option>
                <option value="Released">Released</option>
                <option value="In-Repair">Repair</option>
            </select>
            <button onclick="saveToPostgres()">Submit to Database</button>
        </div>
    </div>
