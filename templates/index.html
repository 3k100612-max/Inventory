<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 100%; max-width: 500px; margin-top: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 20px; text-align: center; }
        
        /* Modal Styles */
        #statusModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 12px; width: 80%; max-width: 400px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-content h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .modal-content p { color: #666; margin-bottom: 20px; font-weight: bold; }

        /* Status Buttons */
        .status-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.2s; font-weight: 500; }
        .in-use { background-color: #3498db; color: white; }
        .in-stock { background-color: #2ecc71; color: white; }
        .retired { background-color: #e74c3c; color: white; }
        .loaned { background-color: #f1c40f; color: #333; }
        .maintenance { background-color: #9b59b6; color: white; }
        .status-btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h1>Inventory Scanner</h1>
    <div id="reader"></div>
    <p id="result-text">Align QR/Barcode to scan</p>
</div>

<!-- Status Selection Modal -->
<div id="statusModal">
    <div class="modal-content">
        <h2>Update Status</h2>
        <p id="scanned-code-display"></p>
        <button class="status-btn in-use" onclick="submitStatus('In Use')">In Use</button>
        <button class="status-btn in-stock" onclick="submitStatus('In Stock')">In Stock</button>
        <button class="status-btn loaned" onclick="submitStatus('Loaned')">Loaned</button>
        <button class="status-btn maintenance" onclick="submitStatus('In Maintenance')">In Maintenance</button>
        <button class="status-btn retired" onclick="submitStatus('Retired')">Retired</button>
    </div>
</div>

<script>
    let html5QrcodeScanner;
    let currentCode = "";

    function onScanSuccess(decodedText, decodedResult) {
        // Pause scanner and save code
        currentCode = decodedText;
        html5QrcodeScanner.pause();
        
        // Show Modal
        document.getElementById('scanned-code-display').innerText = "Code: " + decodedText;
        document.getElementById('statusModal').style.display = "flex";
    }

    function submitStatus(status) {
        console.log(`Code: ${currentCode}, Status: ${status}`);
        
        // Send data to server
        fetch('/scanned', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: currentCode, status: status })
        })
        .then(response => response.json())
        .then(data => {
            alert(`Success! ${currentCode} marked as ${status}`);
            closeModal();
        });
    }

    function closeModal() {
        document.getElementById('statusModal').style.display = "none";
        html5QrcodeScanner.resume(); // Restart camera
    }

    // Initialize Scanner
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
