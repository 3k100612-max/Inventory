<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Inventory Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 1. Include the Barcode Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f0f2f5; padding: 15px; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.08); margin-bottom: 20px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
        .bulk-indicator { display: none; background: #e7f3ff; border: 1px solid #bde0fe; border-radius: 8px; padding: 10px; margin-bottom: 15px; }
        .btn-group-custom { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-group-custom .btn { flex: 1 1 auto; border-radius: 8px !important; }
        /* Style the scan button for mobile */
        .scan-btn { height: 60px; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h2 class="text-center mb-4">Inventory Flow</h2>

    <!-- BULK MODE INDICATOR -->
    <div id="bulk_indicator" class="bulk-indicator shadow-sm">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <strong>Bulk Mode:</strong> 
                <span id="active_status" class="badge bg-primary"></span> 
                <span id="active_dept" class="badge bg-secondary"></span>
            </div>
            <button class="btn btn-sm btn-danger" onclick="exitBulkMode()">Exit</button>
        </div>
    </div>

    <!-- CAMERA SCANNER CARD -->
    <div class="card p-3">
        <div id="reader" class="mb-3"></div>
        <div class="d-grid gap-2">
            <button id="start_btn" class="btn btn-primary scan-btn" onclick="startScanner()">Open Camera Scanner</button>
            <button id="stop_btn" class="btn btn-secondary" onclick="stopScanner()" style="display:none;">Close Camera</button>
        </div>
        <div class="mt-3">
            <input type="text" id="item_code" class="form-control" placeholder="Or type code manually..." autocomplete="off">
        </div>
    </div>

    <!-- RECENT ACTIVITY -->
    <div class="card p-3">
        <h5 class="mb-3">Recent Activity</h5>
        <div class="table-responsive">
            <table class="table table-sm table-hover align-middle">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Status</th>
                        <th>Dept</th>
                    </tr>
                </thead>
                <tbody id="history_body">
                    {% for scan in scans %}
                    <tr>
                        <td class="fw-bold">{{ scan.code }}</td>
                        <td><span class="badge {% if scan.status == 'In Maintenance' %}bg-warning text-dark{% else %}bg-primary{% endif %}">{{ scan.status }}</span></td>
                        <td><span class="badge bg-secondary">{{ scan.department or '-' }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL: ONCE VS MULTIPLE -->
<div class="modal fade" id="modeModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Scanned: <span id="modal_code"></span></h5></div>
            <div class="modal-body text-center">
                <p>Is this a single item or the start of a bulk scan?</p>
                <div class="d-grid gap-3">
                    <button class="btn btn-outline-primary btn-lg" onclick="setupEntry('once')">Single Item (Once)</button>
                    <button class="btn btn-outline-success btn-lg" onclick="setupEntry('multiple')">Multiple Items (Bulk)</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: DETAILS -->
<div class="modal fade" id="detailsModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Set Status & Dept</h5></div>
            <div class="modal-body">
                <label class="fw-bold mb-2">Status</label>
                <div class="btn-group-custom mb-3">
                    <input type="radio" class="btn-check" name="m_status" id="s1" value="In Use" checked>
                    <label class="btn btn-outline-primary" for="s1">In Use</label>
                    <input type="radio" class="btn-check" name="m_status" id="s2" value="Loaned">
                    <label class="btn btn-outline-primary" for="s2">Loaned</label>
                    <input type="radio" class="btn-check" name="m_status" id="s3" value="In Stock">
                    <label class="btn btn-outline-primary" for="s3">In Stock</label>
                    <input type="radio" class="btn-check" name="m_status" id="s4" value="In Maintenance">
                    <label class="btn btn-outline-warning" for="s4">Repair</label>
                </div>

                <label class="fw-bold mb-2">Department</label>
                <div class="btn-group-custom mb-3">
                    <input type="radio" class="btn-check" name="m_dept" id="d1" value="IT" checked>
                    <label class="btn btn-outline-secondary" for="d1">IT</label>
                    <input type="radio" class="btn-check" name="m_dept" id="d2" value="HR">
                    <label class="btn btn-outline-secondary" for="d2">HR</label>
                    <input type="radio" class="btn-check" name="m_dept" id="d3" value="Finance">
                    <label class="btn btn-outline-secondary" for="d3">Fin</label>
                    <input type="radio" class="btn-check" name="m_dept" id="d4" value="Procurement">
                    <label class="btn btn-outline-secondary" for="d4">Proc</label>
                    <input type="radio" class="btn-check" name="m_dept" id="d5" value="Admin">
                    <label class="btn btn-outline-secondary" for="d5">Admin</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success w-100 py-2" onclick="processSave()">Confirm & Start</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let html5QrCode;
let currentCode = "";
let scanMode = "once";
let bulkStatus = null;
let bulkDept = null;

const modeModal = new bootstrap.Modal(document.getElementById('modeModal'));
const detailsModal = new bootstrap.Modal(document.getElementById('detailsModal'));

// --- SCANNER LOGIC ---
function startScanner() {
    document.getElementById('start_btn').style.display = 'none';
    document.getElementById('stop_btn').style.display = 'block';
    
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 150 } };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('start_btn').style.display = 'block';
            document.getElementById('stop_btn').style.display = 'none';
        });
    }
}

function onScanSuccess(decodedText) {
    // Vibrate phone on success
    if (navigator.vibrate) navigator.vibrate(100);
    
    currentCode = decodedText;
    
    if (bulkStatus) {
        // Instant save if Bulk Mode is already set
        quickSave(currentCode, bulkStatus, bulkDept);
    } else {
        // First scan: Ask for Mode
        document.getElementById('modal_code').innerText = currentCode;
        modeModal.show();
    }
}

// Support manual typing as well
document.getElementById('item_code').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        onScanSuccess(this.value);
        this.value = '';
    }
});

// --- WORKFLOW LOGIC ---
function setupEntry(mode) {
    scanMode = mode;
    modeModal.hide();
    detailsModal.show();
}

function processSave() {
    const status = document.querySelector('input[name="m_status"]:checked').value;
    const dept = document.querySelector('input[name="m_dept"]:checked').value;

    if (scanMode === 'multiple') {
        bulkStatus = status;
        bulkDept = dept;
        updateBulkUI();
    }

    quickSave(currentCode, status, dept);
    detailsModal.hide();
}

function quickSave(code, status, dept) {
    fetch('/scanned', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, status: status, department: dept })
    }).then(() => {
        if (scanMode === 'once') location.reload();
        else addRowToTable(code, status, dept);
    });
}

function updateBulkUI() {
    document.getElementById('bulk_indicator').style.display = 'block';
    document.getElementById('active_status').innerText = bulkStatus;
    document.getElementById('active_dept').innerText = bulkDept;
}

function exitBulkMode() {
    bulkStatus = null;
    bulkDept = null;
    location.reload();
}

function addRowToTable(code, status, dept) {
    const tbody = document.getElementById('history_body');
    const row = `<tr><td class="fw-bold">${code}</td><td><span class="badge bg-primary">${status}</span></td><td><span class="badge bg-secondary">${dept}</span></td></tr>`;
    tbody.insertAdjacentHTML('afterbegin', row);
}
</script>

</body>
</html>
