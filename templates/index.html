<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Scanner</title>
    <!-- Load the Scanning Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; border: 1px solid #ccc; border-radius: 8px; }
        #result-message { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Asset Log Scanner</h1>
    
    <!-- Scanner Container -->
    <div id="reader"></div>
    
    <!-- Status Message -->
    <div id="result-message"></div>

    <script>
        const resultMsg = document.getElementById('result-message');

        function showMessage(text, isSuccess) {
            resultMsg.innerText = text;
            resultMsg.className = isSuccess ? 'success' : 'error';
            resultMsg.style.display = 'block';
            // Hide message after 3 seconds
            setTimeout(() => { resultMsg.style.display = 'none'; }, 3000);
        }

        async function onScanSuccess(decodedText, decodedResult) {
            // Stop scanning temporarily to avoid multiple logs for one scan
            html5QrcodeScanner.clear();

            console.log(`Scan Result: ${decodedText}`);
            
            // Send data to Flask API
            try {
                const response = await fetch('/api/log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        asset_id: decodedText,
                        status: "Scanned",
                        type: "Barcode/QR",
                        accessory_detail: "Automatically logged via camera scanner"
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    showMessage(`Successfully Logged: ${decodedText}`, true);
                } else {
                    showMessage(`Error: ${result.message}`, false);
                }
            } catch (err) {
                showMessage("Failed to connect to server", false);
            }

            // Restart scanner after 2 seconds
            setTimeout(() => {
                html5QrcodeScanner.render(onScanSuccess);
            }, 2000);
        }

        // Initialize Scanner
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: 250 }
        );
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
