<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-sm" style="width: 350px;">
        <h4 class="fw-bold text-center mb-4">Inventory Login</h4>
        {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="alert alert-danger py-1 small">{{m}}</div>{% endfor %}{% endif %}{% endwith %}
        <form method="POST">
            <div class="mb-3"><label class="small fw-bold">Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="mb-4"><label class="small fw-bold">Password</label><input type="password" name="password" class="form-control" required></div>
            <button class="btn btn-primary w-100 fw-bold">Login</button>
        </form>
    </div>
</body>
</html>
